<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Aprende Español! — Práctica</title>
<style>
  :root{
    --bg:#0f1226; --panel:#1a1f3d; --panel2:#232a52; --line:rgba(255,255,255,.1);
    --txt:#f3f4fb; --muted:#a6acd6; --accent:#ff5d8f; --accent2:#5b8cff;
    --good:#3ddc97; --bad:#ff6b6b; --warn:#ffcf5c; --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:
    radial-gradient(1200px 600px at 10% -10%,#2a2160 0%,transparent 60%),
    radial-gradient(1000px 500px at 100% 0%,#1d3a6e 0%,transparent 55%),
    var(--bg);color:var(--txt);min-height:100vh;line-height:1.5}
  .wrap{max-width:920px;margin:0 auto;padding:24px 18px 80px}
  header.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:26px}
  .brand{display:flex;align-items:center;gap:12px;cursor:pointer}
  .brand .logo{font-size:30px}
  .brand h1{font-size:22px;font-weight:700;letter-spacing:-.3px}
  .brand p{font-size:12px;color:var(--muted)}
  .pill{background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:8px 14px;font-size:13px;color:var(--muted);display:flex;gap:14px;align-items:center}
  .pill b{color:var(--txt)}
  .hide{display:none!important}

  /* HOME */
  .hero{background:linear-gradient(135deg,#ff5d8f22,#5b8cff22);border:1px solid var(--line);border-radius:var(--radius);padding:22px 24px;margin-bottom:26px}
  .hero h2{font-size:24px;margin-bottom:6px}
  .hero p{color:var(--muted);font-size:15px}
  .section-title{font-size:14px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin:26px 4px 14px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px;cursor:pointer;transition:.18s;position:relative;overflow:hidden}
  .card:hover{transform:translateY(-4px);border-color:var(--accent2)}
  .card .emoji{font-size:34px;display:block;margin-bottom:10px}
  .card h3{font-size:18px;margin-bottom:5px}
  .card p{font-size:13px;color:var(--muted)}
  .card .bar{height:6px;border-radius:999px;background:var(--panel2);margin-top:14px;overflow:hidden}
  .card .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--good),var(--accent2));width:0}
  .card .tag{position:absolute;top:14px;right:14px;font-size:11px;background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:3px 9px;color:var(--muted)}
  .card.special{background:linear-gradient(135deg,#ff5d8f33,#7b5bff33);border-color:#ff5d8f55}

  /* BUTTONS */
  .btn{display:inline-flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:12px;padding:11px 18px;font-size:15px;cursor:pointer;transition:.15s;font-family:inherit}
  .btn:hover{border-color:var(--accent2)}
  .btn.primary{background:linear-gradient(135deg,var(--accent),#ff7eaa);border:none;font-weight:600}
  .btn.ghost{background:transparent}
  .btn:active{transform:scale(.97)}
  .back{color:var(--muted);font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;margin-bottom:18px}
  .back:hover{color:var(--txt)}

  /* MODE SELECT */
  .modes{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-top:18px}
  .mode{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:22px;cursor:pointer;transition:.15s;text-align:center}
  .mode:hover{transform:translateY(-3px);border-color:var(--accent)}
  .mode .ic{font-size:30px;margin-bottom:8px}
  .mode h4{font-size:16px;margin-bottom:4px}
  .mode p{font-size:12px;color:var(--muted)}

  /* QUIZ */
  .quizbox{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:28px 26px;margin-top:8px}
  .progressrow{display:flex;align-items:center;gap:12px;margin-bottom:22px}
  .progressrow .track{flex:1;height:8px;background:var(--panel2);border-radius:999px;overflow:hidden}
  .progressrow .track i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:.3s}
  .progressrow .qn{font-size:13px;color:var(--muted);white-space:nowrap}
  .context{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:10px}
  .prompt{font-size:24px;font-weight:600;margin-bottom:8px;line-height:1.4}
  .translation{font-size:14px;color:var(--muted);font-style:italic;margin-bottom:22px}
  .blank{display:inline-block;min-width:120px;border-bottom:3px solid var(--accent2);color:var(--accent2);text-align:center;padding:0 6px}
  input.answer{font-size:20px;font-family:inherit;background:var(--panel2);border:2px solid var(--line);border-radius:12px;color:var(--txt);padding:12px 16px;width:100%;max-width:340px;outline:none}
  input.answer:focus{border-color:var(--accent2)}
  input.answer.correct{border-color:var(--good);color:var(--good)}
  input.answer.wrong{border-color:var(--bad);color:var(--bad)}
  .opts{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
  .opt{background:var(--panel2);border:2px solid var(--line);border-radius:12px;padding:15px;font-size:17px;cursor:pointer;text-align:center;transition:.12s;font-family:inherit;color:var(--txt)}
  .opt:hover:not(:disabled){border-color:var(--accent2)}
  .opt.correct{border-color:var(--good);background:#3ddc9722;color:var(--good)}
  .opt.wrong{border-color:var(--bad);background:#ff6b6b22;color:var(--bad)}
  .opt:disabled{cursor:default}
  .feedback{min-height:26px;margin:20px 0 4px;font-size:16px;font-weight:600}
  .feedback.good{color:var(--good)}
  .feedback.bad{color:var(--bad)}
  .qfoot{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:18px}
  .swatch{width:100%;height:90px;border-radius:12px;margin-bottom:20px;border:1px solid var(--line)}

  /* MATCH */
  .matchgrid{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-top:10px}
  .mcol{display:flex;flex-direction:column;gap:10px}
  .mitem{background:var(--panel2);border:2px solid var(--line);border-radius:12px;padding:14px;font-size:16px;cursor:pointer;text-align:center;transition:.12s}
  .mitem:hover{border-color:var(--accent2)}
  .mitem.sel{border-color:var(--accent);background:#ff5d8f22}
  .mitem.done{border-color:var(--good);background:#3ddc9722;color:var(--good);cursor:default;opacity:.65}
  .mitem.flash{border-color:var(--bad);background:#ff6b6b22}

  /* RESULTS */
  .results{text-align:center;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:40px 26px}
  .results .big{font-size:64px;margin-bottom:8px}
  .results h2{font-size:26px;margin-bottom:6px}
  .results .score{font-size:46px;font-weight:700;background:linear-gradient(135deg,var(--good),var(--accent2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin:10px 0}
  .results p{color:var(--muted);margin-bottom:24px}
  .rbtns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

  /* confetti */
  .confetti{position:fixed;top:-10px;width:10px;height:14px;z-index:999;pointer-events:none;border-radius:2px}

  /* verbs tense pills */
  .tenses{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .tbtn{font-size:13px;padding:7px 14px;border-radius:999px;border:1px solid var(--line);background:var(--panel2);color:var(--muted);cursor:pointer}
  .tbtn.active{background:var(--accent);color:#fff;border-color:transparent}
  @media(max-width:560px){.matchgrid{gap:14px}.prompt{font-size:20px}.brand p{display:none}}

  /* ===== REELS ===== */
  #reels-overlay{position:fixed;inset:0;z-index:1000;background:#000;display:none}
  #reels-overlay.on{display:block}
  .reel-scroll{height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .reel-scroll::-webkit-scrollbar{display:none}
  .reel{height:100%;scroll-snap-align:start;scroll-snap-stop:always;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:70px 22px 96px;position:relative;color:#fff;text-align:center}
  .reel-cat{position:absolute;top:58px;left:0;right:0;text-align:center;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;opacity:.9;font-weight:600}
  .reel-en{font-size:16px;opacity:.92;font-style:italic;margin-bottom:16px;max-width:440px;line-height:1.4}
  .reel-prompt{font-size:30px;font-weight:700;line-height:1.35;margin-bottom:30px;max-width:500px;text-shadow:0 2px 16px rgba(0,0,0,.3)}
  .reel-big{font-size:74px}
  .reel-blank{display:inline-block;min-width:80px;border-bottom:4px solid rgba(255,255,255,.9);padding:0 8px}
  .reel-swatch{width:150px;height:150px;border-radius:26px;margin-bottom:26px;box-shadow:0 10px 36px rgba(0,0,0,.35);border:3px solid rgba(255,255,255,.6)}
  .reel-opts{display:flex;flex-direction:column;gap:12px;width:100%;max-width:380px}
  .reel-opt{background:rgba(255,255,255,.16);border:2px solid rgba(255,255,255,.4);color:#fff;border-radius:16px;padding:16px;font-size:19px;font-weight:600;cursor:pointer;transition:.13s;font-family:inherit;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
  .reel-opt:hover:not(:disabled){background:rgba(255,255,255,.3);transform:scale(1.02)}
  .reel-opt:active{transform:scale(.97)}
  .reel-opt.correct{background:#fff;color:#168a48;border-color:#fff}
  .reel-opt.wrong{background:rgba(0,0,0,.28);border-color:rgba(255,255,255,.5);opacity:.55;text-decoration:line-through}
  .reel-opt:disabled{cursor:default}
  .reel-fb{min-height:30px;height:30px;margin-top:18px;font-size:21px;font-weight:800;text-shadow:0 2px 10px rgba(0,0,0,.3)}
  .reel-up{position:absolute;bottom:24px;left:0;right:0;text-align:center;font-size:14px;opacity:0;transition:.3s;font-weight:600}
  .reel-up.show{opacity:.95;animation:bob 1.3s infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  .reel-top{position:absolute;top:0;left:0;right:0;z-index:1002;display:flex;justify-content:space-between;align-items:center;padding:16px 18px;color:#fff;font-size:16px;font-weight:700}
  .reel-x{font-size:22px;cursor:pointer;background:rgba(0,0,0,.25);border:none;color:#fff;width:38px;height:38px;border-radius:50%;line-height:1}
  .reel-rail{position:absolute;right:14px;bottom:104px;z-index:1002;display:flex;flex-direction:column;gap:22px;align-items:center;color:#fff}
  .reel-rail .ra{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;font-size:12px;font-weight:700}
  .reel-rail .ra .ic{font-size:30px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.45))}
  .reel-xpfloat{position:absolute;right:26px;bottom:160px;color:#fff;font-size:30px;font-weight:800;z-index:1003;pointer-events:none;text-shadow:0 2px 10px rgba(0,0,0,.4);animation:floatup 1s ease-out forwards}
  @keyframes floatup{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}
  @media(max-width:560px){.reel-prompt{font-size:25px}.reel-big{font-size:60px}}
</style>
</head>
<body>

  <header class="top">
    <div class="brand" onclick="go('home')">
      <span class="logo">🌮</span>
      <div><h1>¡Aprende Español!</h1><p>Practice from your own lessons</p></div>
    </div>
    <div class="pill">🔥 <b id="hdr-streak">0</b> &nbsp; ⭐ <b id="hdr-xp">0</b> XP</div>
  </header>

  <!-- HOME -->
  <section id="view-home"></section>

  <!-- LESSON MODE SELECT -->
  <section id="view-lesson" class="hide"></section>

  <!-- QUIZ -->

  <!-- RESULTS -->

  <!-- VERBS -->

</div>

<!-- REELS (full-screen overlay) -->
<div id="reels-overlay"></div>

<script>
/* ============ NUMBER -> SPANISH ============ */
function numToSpanish(n){
  const u=['cero','uno','dos','tres','cuatro','cinco','seis','siete','ocho','nueve','diez','once','doce','trece','catorce','quince','dieciséis','diecisiete','dieciocho','diecinueve','veinte','veintiuno','veintidós','veintitrés','veinticuatro','veinticinco','veintiséis','veintisiete','veintiocho','veintinueve'];
  const tens={30:'treinta',40:'cuarenta',50:'cincuenta',60:'sesenta',70:'setenta',80:'ochenta',90:'noventa'};
  const hund={100:'cien',200:'doscientos',300:'trescientos',400:'cuatrocientos',500:'quinientos',600:'seiscientos',700:'setecientos',800:'ochocientos',900:'novecientos',1000:'mil'};
  if(n<=29) return u[n];
  if(n<100){const t=Math.floor(n/10)*10,r=n%10;return r===0?tens[t]:tens[t]+' y '+u[r];}
  if(n===100) return 'cien';
  if(n<1000){const h=Math.floor(n/100)*100,r=n%100;const hw=h===100?'ciento':hund[h];return r===0?hund[h]:hw+' '+numToSpanish(r);}
  return 'mil';
}

/* ============ LESSON DATA ============ */
const LESSONS = [
  {

      {a:'January',b:'enero'},{a:'July',b:'julio'},{a:'December',b:'diciembre'},

      {p:'La estación de la nieve es el ___.', t:'season of snow', a:'invierno'},
      {p:'La estación de las flores es la ___.', t:'season of flowers', a:'primavera'},
      {p:'La estación del sol y el calor es el ___.', t:'season of sun & heat', a:'verano'},
      {p:'La estación de las hojas que caen es el ___.', t:'season of falling leaves', a:'otoño'},
      {p:'"Thursday" en español es ___.', t:'translate', a:'jueves'},
      {p:'"September" en español es ___.', t:'translate', a:'septiembre'},
      {p:'Hoy es 20 ___ marzo ___ 2024.', t:'preposition for dates', a:'de'},
      {p:'¿Qué día es la clase? La clase es ___ lunes.', t:'article before days', a:'el'},
      {p:'Después de mañana es pasado ___.', t:'day after tomorrow', a:'mañana'},
      {p:'El mes después de junio es ___.', t:'after June', a:'julio'},
      {p:'Año Nuevo es en ___.', t:'New Year month', a:'enero'}
    ]
  },
  {
    id:'numeros', emoji:'🔢', title:'Números y Colores',
    desc:'Numbers 1–1000 & colors',
    modes:['numbers','mc','match','swatch'],
    match:[
      {a:'green',b:'verde'},{a:'blue',b:'azul'},{a:'yellow',b:'amarillo'},{a:'red',b:'rojo'},
      {a:'pink',b:'rosa'},{a:'orange',b:'naranja'},{a:'black',b:'negro'},{a:'white',b:'blanco'},

      {hex:'#ff4136',a:'rojo'},{hex:'#ff80cc',a:'rosa'},{hex:'#ff851b',a:'naranja'},
      {hex:'#111111',a:'negro'},{hex:'#ffffff',a:'blanco'},{hex:'#aaaaaa',a:'gris'},
      {hex:'#8b5a2b',a:'marrón'},{hex:'#b10dc9',a:'violeta'}
    ],
    bank:[
      {p:'500 en español se escribe ___.', t:'number', a:'quinientos'},
      {p:'1000 en español se escribe ___.', t:'number', a:'mil'},

      {p:'700 en español se escribe ___.', t:'number', a:'setecientos'},
      {p:'100 en español se escribe ___.', t:'number', a:'cien'},
      {p:'El color de la nieve es ___.', t:'color of snow', a:'blanco'},
      {p:'El color del sol es ___.', t:'color of the sun', a:'amarillo'},

  {
    id:'pronombres', emoji:'🙋', title:'Pronombres Personales',

      {p:'Yo + tú = ___', t:'pronoun math', a:'nosotros', opts:['nosotros','vosotros','ellos','ustedes']},
      {p:'Él + ella = ___', t:'pronoun math', a:'ellos', opts:['ellos','ellas','nosotros','vosotros']},
      {p:'Ella + ella = ___', t:'pronoun math', a:'ellas', opts:['ellas','ellos','nosotras','vosotras']},

      {p:'___ va a ser ingeniero.', t:'3rd sing. masculine', a:'él', opts:['él','ella','usted','yo']}

  {
    id:'serestar', emoji:'⚖️', title:'Ser vs Estar',
    desc:'Choose the right verb + conjugation',
    modes:['mc','fill'],
    bank:[
      {p:'Medellín ___ en Colombia.', t:'location', a:'está', opts:['es','está']},
      {p:'Rubén ___ peruano.', t:'nationality', a:'es', opts:['es','está']},
      {p:'Rubén es peruano, pero ahora ___ en Buenos Aires.', t:'location', a:'está', opts:['es','está']},
      {p:'¿Qué hora es? ___ las 2:00.', t:'telling time', a:'Son', opts:['Son','Están']},
      {p:'Yo ___ periodista.', t:'profession', a:'soy', opts:['soy','estoy']},
      {p:'Lucía ___ una chica muy alegre.', t:'permanent trait', a:'es', opts:['es','está']},
      {p:'...pero últimamente ___ triste.', t:'temporary mood', a:'está', opts:['es','está']},
      {p:'Este tiramisú ___ muy bien hecho.', t:'opinion/condition', a:'está', opts:['es','está']},
      {p:'¡Cómo vuela el tiempo! Ya ___ en mayo.', t:'months', a:'estamos', opts:['somos','estamos']},

      {p:'Mañana ___ festivo. ¿Hay que trabajar?', t:'date', a:'es', opts:['es','está']},
      {p:'Manu ___ muy nerviosa por su entrevista.', t:'emotion', a:'está', opts:['es','está']},

      {p:'Los profesores ___ muy cansados hoy.', t:'physical state', a:'están', opts:['son','están']},
      {p:'¿Dónde ___ el concierto de Shakira?', t:'event location', a:'es', opts:['es','está']},
      {p:'(ser) Yo ___ de Uruguay.', t:'conjugate ser', a:'soy'},
      {p:'(ser) Ana y yo ___ arquitectas.', t:'conjugate ser', a:'somos'},

      {p:'(estar) Ellos ___ de vacaciones.', t:'conjugate estar', a:'están'}
    ]
  },
  {

const $=s=>document.querySelector(s);
const rand=a=>a[Math.floor(Math.random()*a.length)];
const shuffle=a=>a.map(x=>[Math.random(),x]).sort((p,q)=>p[0]-q[0]).map(x=>x[1]);
const norm=s=>s.trim().toLowerCase().replace(/\s+/g,' ');
function bump(good){ if(good){xp+=10;globalStreak++;} else {globalStreak=0;} $('#hdr-xp').textContent=xp; $('#hdr-streak').textContent=globalStreak;

/* ============ QUIZ ENGINE (fill / mc) ============ */
let quiz=null;
function buildOpts(item,bank){
  if(item.opts) return shuffle(item.opts.slice());
  let pool=[...new Set(bank.map(b=>b.a).filter(a=>a!==item.a))];
  let distract=shuffle(pool).slice(0,3);
  return shuffle([item.a,...distract]);
}
function startQuiz(lesson,mode){
  let items=shuffle(lesson.bank.slice()).slice(0,Math.min(10,lesson.bank.length));
  quiz={lesson,mode,items,i:0,correct:0,answered:false};
  go('quiz'); renderQ();
}
function renderQ(){
  let {items,i,mode,lesson}=quiz;
  let item=items[i];
  quiz.answered=false;
  let pct=Math.round(i/items.length*100);
  let promptHtml=item.p.replace('___',`<span class="blank">?</span>`);
  let body;
  if(mode==='mc'){
    let opts=buildOpts(item,lesson.bank);
    body=`<div class="opts">${opts.map(o=>`<button class="opt" onclick="answerMC(this,'${o.replace(/'/g,"\\'")}')">${o}</button>`).join('')}</div>`;
  } else {
    body=`<input class="answer" id="ans" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="type here…">`;
  }
  $('#view-quiz').innerHTML=`
    <div class="back" onclick="openLesson('${lesson.id}')">← Back</div>
    <div class="quizbox">
      <div class="progressrow"><div class="track"><i style="width:${pct}%"></i></div><div class="qn">${i+1} / ${items.length}</div></div>
      <div class="context">${item.t||lesson.title}</div>
      <div class="prompt">${promptHtml}</div>
      <div class="translation">${mode==='fill'?'Hint: '+(item.t||''):''}</div>
      ${body}
      <div class="feedback" id="fb"></div>
      <div class="qfoot">
        <span class="qn">🔥 ${globalStreak} streak</span>
        <button class="btn primary" id="next" onclick="checkOrNext()">Check</button>
      </div>
    </div>`;
  if(mode==='fill'){ let a=$('#ans'); a.focus(); a.addEventListener('keydown',e=>{if(e.key==='Enter')checkOrNext();}); }
}
function showResult(good,ans){
  quiz.answered=true;
  let fb=$('#fb');
  if(good){ quiz.correct++; fb.className='feedback good'; fb.textContent=rand(['¡Correcto! 🎉','¡Exacto! ✨','¡Muy bien! 👏','¡Perfecto! 🌟']); }
  else{ fb.className='feedback bad'; fb.textContent='Answer: '+ans; }
  bump(good);
  // reflect blank
  let blank=$('.prompt .blank'); if(blank){blank.textContent=ans; blank.style.color=good?'var(--good)':'var(--bad)'; blank.style.borderColor=good?'var(--good)':'var(--bad)';}
  $('#next').textContent = (quiz.i+1>=quiz.items.length)?'See results →':'Next →';
}
function answerMC(btn,val){
  if(quiz.answered) return;
  let item=quiz.items[quiz.i];
  let good=val===item.a;
  document.querySelectorAll('.opt').forEach(b=>{
    if(b.textContent===item.a) b.classList.add('correct');
    else if(b===btn) b.classList.add('wrong');
    b.disabled=true;
  });
  showResult(good,item.a);
}
function checkOrNext(){
  let item=quiz.items[quiz.i];
  if(!quiz.answered){
    if(quiz.mode==='fill'){
      let a=$('#ans'); if(!a.value.trim())return;
      let good=norm(a.value)===norm(item.a);
      a.classList.add(good?'correct':'wrong'); a.disabled=true;
      showResult(good,item.a);
    }
    return; // mc handled by click
  }
  // next
  quiz.i++;
  if(quiz.i>=quiz.items.length) showResults(quiz.correct,quiz.items.length,()=>startQuiz(quiz.lesson,quiz.mode),quiz.lesson.id);
  else renderQ();
}

function startNumbers(){ numState={correct:0,total:0,answered:false}; go('quiz'); renderNum(); }
function renderNum(){
  numState.answered=false;
  let big = Math.random()<0.4 ? rand([100,200,300,400,500,600,700,800,900,1000]) : Math.floor(Math.random()*99)+1;
  let answer=numToSpanish(big);
  // distractors
  let opts=new Set([answer]);
  while(opts.size<4){
    let d = big<=100 ? Math.max(0,big+rand([-5,-3,-2,2,3,7,10,-10])) : rand([100,200,300,400,500,600,700,800,900,1000]).valueOf()+rand([0,0,0,1,2]);
    let w=numToSpanish(Math.min(1000,Math.max(0,d))); opts.add(w);

/* ============ MATCHING GAME ============ */
let match=null;
function startMatch(lesson){
  let pairs=shuffle(lesson.match.slice()).slice(0,Math.min(8,lesson.match.length));
  match={lesson,pairs,selLeft:null,done:0};
  let left=pairs.map((p,idx)=>`<div class="mitem" data-i="${idx}" onclick="pickLeft(${idx})">${p.a}</div>`).join('');
  let rights=shuffle(pairs.map((p,idx)=>({idx,b:p.b})));
  let right=rights.map(r=>`<div class="mitem" data-i="${r.idx}" onclick="pickRight(${r.idx})">${r.b}</div>`).join('');
  $('#view-match').innerHTML=`
    <div class="back" onclick="openLesson('${lesson.id}')">← Back</div>
    <div class="quizbox">
      <div class="context">${lesson.title} — connect the pairs</div>
      <div class="prompt" style="font-size:18px">Tap a word on the left, then its match on the right 🔗</div>
      <div class="matchgrid">
        <div class="mcol" id="mleft">${left}</div>
        <div class="mcol" id="mright">${right}</div>
      </div>
      <div class="feedback" id="fb"></div>
    </div>`;
  go('match');
}
function pickLeft(i){
  let el=document.querySelector(`#mleft .mitem[data-i="${i}"]`);
  if(el.classList.contains('done'))return;
  document.querySelectorAll('#mleft .mitem').forEach(m=>m.classList.remove('sel'));
  el.classList.add('sel'); match.selLeft=i;
}
function pickRight(i){
  if(match.selLeft===null)return;
  let r=document.querySelector(`#mright .mitem[data-i="${i}"]`);
  let l=document.querySelector(`#mleft .mitem[data-i="${match.selLeft}"]`);
  if(r.classList.contains('done'))return;
  if(i===match.selLeft){
    l.classList.remove('sel'); l.classList.add('done'); r.classList.add('done');
    match.selLeft=null; match.done++; bump(true);
    if(match.done===match.pairs.length){
      $('#fb').className='feedback good'; $('#fb').textContent='¡Completado! 🎉';
      setTimeout(()=>showResults(match.pairs.length,match.pairs.length,()=>startMatch(match.lesson),match.lesson.id),700);
    }
  } else {
    r.classList.add('flash'); l.classList.remove('sel'); match.selLeft=null; bump(false);
    let fb=$('#fb'); fb.className='feedback bad'; fb.textContent='Not a match, try again';
    setTimeout(()=>{r.classList.remove('flash'); fb.textContent='';},500);
  }
}

function showResults(correct,total,retry,lessonId){
  let pct=Math.round(correct/total*100);

  let msg = pct===100?'Perfect score!':pct>=70?'Great job!':pct>=40?'Keep practicing!':'Don\'t give up!';

    <div class="results">
      <div class="big">${emoji}</div>

      <div class="score">${correct} / ${total}</div>

        <button class="btn" onclick="openLesson('${lessonId}')">Other modes</button>

function confetti(){
  const colors=['#ff5d8f','#5b8cff','#3ddc97','#ffcf5c','#b10dc9'];
  for(let i=0;i<60;i++){
    let c=document.createElement('div'); c.className='confetti';
    c.style.left=Math.random()*100+'vw'; c.style.background=rand(colors);

  }
}

function buildPools(){
  VOCAB_POOL=[]; GRAMMAR_POOL=[];
  const vocabLessons=['dias','numeros','adjetivos','descripcion','objetos','lugares'];
  vocabLessons.forEach(id=>{ let l=LESSONS.find(x=>x.id===id); if(l&&l.match) l.match.forEach(p=>VOCAB_POOL.push({a:p.a,b:p.b,cat:l.title})); });

  grammarLessons.forEach(id=>{ let l=LESSONS.find(x=>x.id===id); if(!l||!l.bank) return;
    l.bank.forEach(item=>{
      let opts = item.opts ? item.opts.slice() : [item.a,...mcDistract(item.a,l.bank.map(b=>b.a))];
      if(opts.length<2) return;

    if(opts.length<4) opts=shuffle([v.a,...mcDistract(v.a,VOCAB_POOL.map(x=>x.a))]);

let reelIdx=0; const reelData={}; let reelIO=null, activeReelEl=null, reelMode='vocab';
function reelCardHTML(cid,c){

function startReels(mode){
  reelMode = mode==='grammar' ? 'grammar' : 'vocab';

function reelNext(reel){ let nx=reel&&reel.nextElementSibling; if(nx) nx.scrollIntoView({behavior:'smooth'}); }

  if(!$('#reels-overlay').classList.contains('on')) return;
  if(e.key==='ArrowDown'){ e.preventDefault(); reelSkip(); }
  else if(['1','2','3','4'].includes(e.key)){ let opts=activeReelEl&&activeReelEl.querySelectorAll('.reel-opt'); let i=+e.key-1; if(opts&&opts[i]&&!opts[i].disabled) opts[i].click(); }
});

/* ============ INIT ============ */
buildPools();
renderHome();
</script>
</body>
